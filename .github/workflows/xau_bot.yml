name: XAU Signal Bot

on:
  schedule:
    - cron: '*/5 * * * *'    # chạy mỗi 5 phút (mức tối thiểu GitHub Actions cho phép, giờ UTC)
  workflow_dispatch:          # cho phép bấm chạy thủ công để test

permissions:
  contents: write   # cần quyền ghi để bot tự lưu lại lịch sử tín hiệu (signal_log.json)

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python xau_signal_bot.py

      - name: Lưu lại lịch sử tín hiệu (signal_log.json)
        run: |
          git config user.name "xau-signal-bot"
          git config user.email "actions@github.com"
          git add signal_log.json
          git diff --cached --quiet || git commit -m "Cập nhật lịch sử tín hiệu [skip ci]"
          git pull --rebase
          git push
